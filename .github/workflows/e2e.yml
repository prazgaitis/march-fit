name: E2E Tests

on:
  schedule:
    # Run every night at 3:00 AM UTC
    - cron: "0 3 * * *"
  workflow_dispatch: # Allow manual triggers

env:
  PNPM_VERSION: 10.14.0

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm -F e2e exec playwright install --with-deps chromium

      - name: Run E2E tests
        env:
          E2E_BASE_URL: "https://march.fit"
          E2E_CHALLENGE_ID: ${{ secrets.E2E_CHALLENGE_ID }}
          E2E_CHALLENGE_INVITE_CODE: ${{ secrets.E2E_CHALLENGE_INVITE_CODE }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
        run: pnpm -F e2e test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14

      - name: Upload test traces
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: e2e/test-results/
          retention-days: 7
